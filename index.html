<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#06B6D4" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/jpeg" href="/logo-user.jpg" />
    <link rel="apple-touch-icon" href="/logo-user.jpg" />
    <title>Open Waters — SUP</title>
    <style>
      body { background: #CFE8F8; }
      #loading-screen {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; z-index: 9999;
        background: linear-gradient(135deg, #E0F7FF 0%, #B3ECFF 25%, #CFFAFE 50%, #DBEAFE 75%, #E0F2FE 100%);
        transition: opacity 0.5s ease;
      }
      #loading-screen.hidden { opacity: 0; pointer-events: none; }
      #loading-logo { width: 80px; height: 80px; border-radius: 20px; }
      .loading-spinner {
        width: 24px; height: 24px; border: 3px solid rgba(6,182,212,0.2);
        border-top-color: #06B6D4; border-radius: 50%;
        animation: spin 1s linear infinite; margin-top: 16px;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!-- Loading screen -->  
    <div id="loading-screen">
      <img id="loading-logo" src="/logo-user.jpg" alt="Open Waters" />
      <div class="loading-spinner"></div>
    </div>

    <div id="root"></div>

    <!-- Telegram WebApp SDK -->  
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
